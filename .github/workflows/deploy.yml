name: Build, Push, Deploy

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to VPS after build?'
        type: boolean
        default: true

# Required permissions: contents=write, packages=write, id-token=write (for OIDC)
permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}  # = tiarh/ikr-isp
  IMAGE_TAG: sha-${{ github.sha }}

jobs:
  test:
    name: Lint + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, gd, zip, intl, bcmath
          coverage: none

      - name: Pre-create writable Laravel dirs
        run: |
          mkdir -p bootstrap/cache storage/framework/cache/data storage/framework/sessions storage/framework/testing storage/framework/views storage/logs
          chmod -R 0777 bootstrap/cache storage
          ls -ld bootstrap/cache storage

      - name: 'Install Composer deps (CI override: dontdiscover all + strip scripts)'
        env:
          COMPOSER_NO_SCRIPTS: '1'
        run: |
          # Backup real composer.json
          cp composer.json composer.json.real
          # Strip scripts that need .env/DB, add dont-discover
          python3 scripts/ci_composer_patch.py
          # Install with --no-scripts (CI override)
          composer install --prefer-dist --no-progress --no-security-blocking --no-scripts --no-plugins --no-autoloader
          composer dump-autoload --no-scripts --no-plugins
          # Restore real composer.json for any subsequent steps
          mv composer.json.real composer.json

      - name: PHP syntax check
        run: find app -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Run PHPUnit
        run: |
          cp .env.example .env
          php artisan key:generate --force
          vendor/bin/phpunit --testsuite=Unit

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm deps (fallback ke install kalau lockfile gak ada)
        run: |
          if [ -f package-lock.json ]; then
            npm ci --prefer-offline --no-security-blocking
          else
            npm install --prefer-offline --no-security-blocking --no-fund
          fi

      - name: ESLint
        run: npx eslint resources/js --ext .ts,.tsx || echo "Lint warnings (non-blocking)"

      - name: TypeScript check
        run: npx tsc --noEmit || echo "TS warnings (non-blocking)"

  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          provenance: false

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy)
    environment:
      name: production
      url: http://ikr.sky.net.id:8080
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            export APP_IMAGE_TAG=${{ env.IMAGE_TAG }}
            cd /opt/ikr-isp
            # Sync production stack files from repo (in case compose/Dockerfile changed)
            curl -fsSL https://raw.githubusercontent.com/tiarh/ikr-isp/main/docker-compose.prod.yml -o docker-compose.prod.yml
            # Pull image baru
            docker compose -f docker-compose.prod.yml --env-file .env pull app
            # Restart app container (queue + scheduler ada di dalam image yg sama)
            docker compose -f docker-compose.prod.yml --env-file .env up -d --no-deps app
            # Tunggu healthy
            sleep 10
            docker compose -f docker-compose.prod.yml ps
            # Cleanup old images
            docker image prune -f
            echo "✅ Deployed: $(echo $APP_IMAGE_TAG | cut -c1-7)"

      - name: Notify (optional)
        if: always()
        run: |
          echo "Deployment status: ${{ job.status }}"
          # Tambah Telegram notif kalo perlu
