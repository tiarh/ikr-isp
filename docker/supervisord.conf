[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0
pidfile=/run/supervisord.pid

[program:php-fpm]
command=php-fpm -F
autostart=true
autorestart=true
priority=10

[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
priority=20

[program:queue]
command=php /app/artisan queue:work --tries=3 --sleep=3 --timeout=60
autostart=true
autorestart=true
priority=30

[program:scheduler]
command=sh -c "while true; do php /app/artisan schedule:run --no-interaction; sleep 60; done"
autostart=true
autorestart=true
priority=40
