# IKR-ISP production stack
# Usage:
#   docker compose -f docker-compose.prod.yml --env-file .env up -d
#   docker compose -f docker-compose.prod.yml logs -f
#   docker compose -f docker-compose.prod.yml exec app php artisan migrate --seed

services:
  app:
    image: ghcr.io/tiarh/ikr-isp:${APP_IMAGE_TAG:-latest}
    container_name: skynet-ikr-app
    restart: unless-stopped
    env_file: .env
    networks:
      - ikr-internal
      - skynet-shared
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/up"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    labels:
      - "coolify.managed=true"
      - "coolify.type=app"

  # MySQL: pakai external (existing skynet-ebilling-mysql-1)
  # TAPI kita perlu database baru 'ikr_isp'
  # Cara setup:
  #   docker exec skynet-ebilling-mysql-1 mysql -uroot -p... -e "CREATE DATABASE ikr_isp;"
  #   atau buat di sini container terpisah (uncomment di bawah)
  #
  # mysql:
  #   image: mysql:8.0
  #   container_name: skynet-ikr-mysql
  #   restart: unless-stopped
  #   environment:
  #     MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
  #     MYSQL_DATABASE: ikr_isp
  #     MYSQL_USER: ikr_isp
  #     MYSQL_PASSWORD: ${DB_PASSWORD}
  #   volumes:
  #     - ikr-mysql-data:/var/lib/mysql
  #   networks:
  #     - ikr-internal
  #   healthcheck:
  #     test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
  #     interval: 10s
  #     timeout: 5s
  #       retries: 5

  # Redis: pakai external (existing skynet-ebilling-redis-1)
  # atau buat terpisah (uncomment)
  #
  # redis:
  #   image: redis:7-alpine
  #   container_name: skynet-ikr-redis
  #   restart: unless-stopped
  #   command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
  #   networks:
  #     - ikr-internal
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #       timeout: 3s
  #       retries: 3

networks:
  ikr-internal:
    driver: bridge
  # skynet-ebilling_default is the network used by skynet-ebilling (mysql, redis, etc).
  # Connecting to it gives this app access to existing MySQL/Redis without
  # running them inside this compose.
  skynet-shared:
    external: true
    name: skynet-ebilling_default

volumes:
  ikr-mysql-data:
